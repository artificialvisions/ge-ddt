<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GE Healthcare - Generatore DDT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6E4C9F 0%, #8B5FBF 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(110, 76, 159, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #6E4C9F 0%, #8B5FBF 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid #5A3D7F;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            opacity: 0.95;
            font-size: 14px;
            font-weight: 300;
        }

        .content {
            padding: 40px;
        }

        .step {
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .step:nth-child(1) { animation-delay: 0.1s; }
        .step:nth-child(2) { animation-delay: 0.2s; }
        .step:nth-child(3) { animation-delay: 0.3s; }
        .step:nth-child(4) { animation-delay: 0.4s; }
        .step:nth-child(5) { animation-delay: 0.5s; }
        .step:nth-child(6) { animation-delay: 0.6s; }

        .step-number {
            display: inline-block;
            background: linear-gradient(135deg, #6E4C9F 0%, #8B5FBF 100%);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            margin-right: 10px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus {
            outline: none;
            border-color: #6E4C9F;
            box-shadow: 0 0 0 3px rgba(110, 76, 159, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-input-button {
            display: inline-block;
            padding: 12px 20px;
            background: linear-gradient(135deg, #6E4C9F 0%, #8B5FBF 100%);
            color: white;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .file-input-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(110, 76, 159, 0.3);
        }

        .file-name {
            margin-top: 10px;
            padding: 8px;
            background: #f8f4fc;
            border-radius: 4px;
            font-size: 13px;
            color: #6E4C9F;
            display: none;
            border-left: 3px solid #6E4C9F;
        }

        .btn {
            background: linear-gradient(135deg, #6E4C9F 0%, #8B5FBF 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(110, 76, 159, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #6E4C9F;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6E4C9F;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .preview {
            margin-top: 20px;
            padding: 15px;
            background: #f8f4fc;
            border-radius: 4px;
            display: none;
            border-left: 4px solid #6E4C9F;
        }

        .preview.active {
            display: block;
        }

        .preview h3 {
            color: #6E4C9F;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .preview-item {
            padding: 8px;
            background: white;
            margin: 5px 0;
            border-radius: 4px;
            font-size: 13px;
            border-left: 2px solid #6E4C9F;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        .error.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>GE HEALTHCARE</h1>
            <p>Generatore Documento di Trasporto (D.D.T.)</p>
        </div>

        <div class="content">
            <div class="step">
                <label>
                    <span class="step-number">1</span>
                    Carica Packing Slip (PDF)
                </label>
                <div class="file-input-wrapper">
                    <div class="file-input-button">Seleziona File PDF</div>
                    <input type="file" id="packingSlip" accept=".pdf" />
                </div>
                <div class="file-name" id="fileName"></div>
            </div>

            <div class="step">
                <label for="boxNumber">
                    <span class="step-number">2</span>
                    Numero BOX (Cnt#)
                </label>
                <input type="text" id="boxNumber" placeholder="es. 1,2,3 o 1-5 (vuoto = tutti)">
                <div class="hint">Gli articoli saranno ordinati per box number</div>
            </div>

            <div class="step">
                <label for="causale">
                    <span class="step-number">3</span>
                    Causale del Trasporto
                </label>
                <input type="text" id="causale" placeholder="es. TRASFERIMENTO, DIMOSTRAZIONE, SOSTITUZIONE..." required>
                <div class="hint">Inserisci la causale del trasporto</div>
            </div>

            <div class="step">
                <label for="docNumber">
                    <span class="step-number">4</span>
                    Numero Documento (opzionale)
                </label>
                <input type="text" id="docNumber" placeholder="es. DDT/2025/001">
            </div>

            <div class="step">
                <label for="delDate">
                    <span class="step-number">5</span>
                    Data DEL
                </label>
                <input type="date" id="delDate" required>
            </div>

            <div class="step">
                <label for="destinatario">
                    <span class="step-number">6</span>
                    Destinatario (Luogo di Destinazione)
                </label>
                <textarea id="destinatario" placeholder="Inserisci l'indirizzo completo" required></textarea>
            </div>

            <div class="error" id="error"></div>
            
            <div class="preview" id="preview">
                <h3>Anteprima Dati Estratti</h3>
                <div id="previewContent"></div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Elaborazione in corso...</p>
            </div>

            <button class="btn" id="generateBtn" onclick="generateDDT()">
                Genera D.D.T. PDF
            </button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let packingSlipData = null;

        document.getElementById('packingSlip').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileName').style.display = 'block';
                loadPDF(file);
            }
        });

        async function loadPDF(file) {
            showLoading(true);
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                
                let fullText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    
                    const sortedItems = textContent.items.sort((a, b) => {
                        const yDiff = Math.abs(a.transform[5] - b.transform[5]);
                        if (yDiff < 5) {
                            return a.transform[4] - b.transform[4];
                        }
                        return b.transform[5] - a.transform[5];
                    });
                    
                    let lastY = null;
                    sortedItems.forEach(item => {
                        const currentY = Math.round(item.transform[5]);
                        if (lastY !== null && Math.abs(currentY - lastY) > 5) {
                            fullText += '\n';
                        }
                        fullText += item.str + ' ';
                        lastY = currentY;
                    });
                    fullText += '\n\n';
                }
                
                packingSlipData = parsePackingSlip(fullText);
                
                if (packingSlipData.items.length === 0) {
                    showError('Nessun articolo trovato nel PDF!');
                } else {
                    showPreview(packingSlipData);
                }
                
                showLoading(false);
            } catch (error) {
                showError('Errore caricamento PDF: ' + error.message);
                showLoading(false);
            }
        }

        function parsePackingSlip(text) {
            const data = {
                deliveryName: '',
                waybill: '',
                items: [],
                serialMap: {}
            };

            let deliveryMatch = text.match(/Delivery\s+Name[:\s]+(\d+)/i);
            if (!deliveryMatch) {
                deliveryMatch = text.match(/(\d{10})/);
            }
            if (deliveryMatch) data.deliveryName = deliveryMatch[1];

            const waybillMatch = text.match(/Waybill[:\s]+([A-Z0-9]{10,})/i);
            if (waybillMatch) data.waybill = waybillMatch[1];

            const serialSection = text.match(/Lot\/Serial Information([\s\S]*?)Additional Information/i);
            if (serialSection) {
                const serialText = serialSection[1];
                const serialMatches = serialText.matchAll(/(H\d{5}[A-Z]{2})\s+\d+\s+\d+\s+(\d{7}WX\d)/g);
                for (const match of serialMatches) {
                    const itemCode = match[1];
                    const serial = match[2];
                    if (!data.serialMap[itemCode]) {
                        data.serialMap[itemCode] = [];
                    }
                    data.serialMap[itemCode].push(serial);
                }
            }

            const containerSection = text.match(/Container Summary([\s\S]*?)Container Information/i);
            if (!containerSection) {
                return data;
            }

            const containerText = containerSection[1];
            const lines = containerText.split('\n');
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                const itemMatch = line.match(/UAS\d+\s+(\d+)\s+(H\d{5}[A-Z]{2})\s*-\s*\(([^)]+)\)\s+(\d+)\s+\d+/);
                
                if (itemMatch) {
                    const boxNumber = parseInt(itemMatch[1]);
                    const itemNumber = itemMatch[2];
                    let description = itemMatch[3].trim().replace(/\.\.\.$/, '').trim();
                    const quantity = parseInt(itemMatch[4]);
                    
                    let serial = 'N/A';
                    if (data.serialMap[itemNumber] && data.serialMap[itemNumber].length > 0) {
                        serial = data.serialMap[itemNumber].shift();
                    }
                    
                    data.items.push({
                        boxNumber,
                        itemNumber,
                        description,
                        quantity,
                        serial
                    });
                }
            }

            return data;
        }

        function showPreview(data) {
            const preview = document.getElementById('preview');
            const content = document.getElementById('previewContent');
            
            let html = `
                <div class="preview-item"><strong>Articoli trovati:</strong> ${data.items.length}</div>
            `;
            
            if (data.items.length > 0) {
                const boxGroups = {};
                data.items.forEach(item => {
                    if (!boxGroups[item.boxNumber]) {
                        boxGroups[item.boxNumber] = [];
                    }
                    boxGroups[item.boxNumber].push(item);
                });

                html += '<div style="margin-top: 10px;"><strong>Box: ' + Object.keys(boxGroups).sort((a,b) => a-b).join(', ') + '</strong></div>';
                html += '<div style="margin-top: 10px;"><strong>Primi 5 articoli:</strong></div>';
                
                data.items.slice(0, 5).forEach(item => {
                    html += `<div class="preview-item" style="font-size: 12px;">
                        <strong>Box ${item.boxNumber}</strong> - ${item.itemNumber} - ${item.description.substring(0, 40)}${item.description.length > 40 ? '...' : ''}<br>
                        <span style="color: #666;">S/N: ${item.serial} | Qty: ${item.quantity}</span>
                    </div>`;
                });

                if (data.items.length > 5) {
                    html += `<div class="preview-item" style="text-align: center; color: #666;">
                        ... e altri ${data.items.length - 5} articoli
                    </div>`;
                }
            }
            
            content.innerHTML = html;
            preview.classList.add('active');
        }

        function parseBoxNumbers(input) {
            if (!input || input.trim() === '') {
                return null;
            }

            const boxNumbers = new Set();
            const parts = input.split(',').map(s => s.trim());

            parts.forEach(part => {
                if (part.includes('-')) {
                    const [start, end] = part.split('-').map(n => parseInt(n.trim()));
                    if (!isNaN(start) && !isNaN(end)) {
                        for (let i = start; i <= end; i++) {
                            boxNumbers.add(i);
                        }
                    }
                } else {
                    const num = parseInt(part);
                    if (!isNaN(num)) {
                        boxNumbers.add(num);
                    }
                }
            });

            return boxNumbers.size > 0 ? Array.from(boxNumbers).sort((a, b) => a - b) : null;
        }

        async function generateDDT() {
            if (!packingSlipData || packingSlipData.items.length === 0) {
                showError('Carica prima una Packing Slip valida!');
                return;
            }

            const boxNumberInput = document.getElementById('boxNumber').value;
            const docNumber = document.getElementById('docNumber').value;
            const delDate = document.getElementById('delDate').value;
            const destinatario = document.getElementById('destinatario').value;
            const causale = document.getElementById('causale').value;

            if (!delDate || !destinatario || !causale) {
                showError('Compila tutti i campi obbligatori!');
                return;
            }

            showLoading(true);

            try {
                let itemsToInclude = packingSlipData.items;
                const selectedBoxes = parseBoxNumbers(boxNumberInput);
                
                if (selectedBoxes) {
                    itemsToInclude = packingSlipData.items.filter(item => 
                        selectedBoxes.includes(item.boxNumber)
                    );
                    
                    if (itemsToInclude.length === 0) {
                        showError('Nessun articolo per i box specificati!');
                        showLoading(false);
                        return;
                    }
                }

                // ORDINA PER BOX NUMBER
                itemsToInclude.sort((a, b) => a.boxNumber - b.boxNumber);

                const pdfDoc = await PDFLib.PDFDocument.create();
                let page = pdfDoc.addPage([595.28, 841.89]);
                const { width, height } = page.getSize();
                
                const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
                const fontBold = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);

                let y = height - 40;

                // HEADER
                page.drawText('DOCUMENTO NÂ°: MOD.ESENZIONE rev.0', {
                    x: 40, y: y, size: 8, font: font
                });
                page.drawText('DOCUMENTO DI TRASPORTO (D.D.T.)', {
                    x: 340, y: y, size: 10, font: fontBold
                });
                y -= 12;
                page.drawText('(D.P.R. 472 del 14-08-1996 â€“ D.P.R. 696 del 21-12-1996)', {
                    x: 310, y: y, size: 7, font: font
                });

                y -= 30;

                // RIQUADRI SUPERIORI - PERFETTAMENTE ALLINEATI
                const topBoxY = y;
                
                // RIQUADRO COMMITTENTE
                page.drawRectangle({
                    x: 40, y: topBoxY - 62, width: 250, height: 67,
                    borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 1
                });
                page.drawText('COMMITTENTE (CEDENTE):', { x: 45, y: topBoxY - 2, size: 8, font: fontBold });
                page.drawText('GE ULTRASOUND', { x: 45, y: topBoxY - 19, size: 9, font: font });
                page.drawText('VIA GALENO, 36', { x: 45, y: topBoxY - 32, size: 9, font: font });
                page.drawText('20126 MILANO (MI)', { x: 45, y: topBoxY - 45, size: 9, font: font });

                // RIQUADRO NUMERO E DATA - STESSO ALLINEAMENTO
                page.drawRectangle({
                    x: 300, y: topBoxY - 62, width: 255, height: 67,
                    borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 1
                });
                
                let rightY = topBoxY - 2;
                page.drawText('NUMERO:', { x: 305, y: rightY, size: 8, font: fontBold });
                if (docNumber) {
                    page.drawText(docNumber, { x: 355, y: rightY, size: 9, font: font });
                }
                page.drawText('DEL:', { x: 450, y: rightY, size: 8, font: fontBold });
                page.drawText(formatDate(delDate), { x: 480, y: rightY, size: 9, font: font });
                
                rightY -= 17;
                page.drawText('RIFERIMENTO MITTENTE:', { x: 305, y: rightY, size: 8, font: fontBold });
                
                rightY -= 17;
                page.drawText('A MEZZO:', { x: 305, y: rightY, size: 7, font: font });
                
                // Disegna checkbox grafici
                const checkboxY = rightY - 2;
                page.drawRectangle({ x: 348, y: checkboxY, width: 8, height: 8, borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 0.5 });
                page.drawText('VETTORE', { x: 360, y: rightY, size: 7, font: font });
                
                page.drawRectangle({ x: 408, y: checkboxY, width: 8, height: 8, borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 0.5 });
                page.drawText('CEDENTE', { x: 420, y: rightY, size: 7, font: font });
                
                page.drawRectangle({ x: 468, y: checkboxY, width: 8, height: 8, borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 0.5 });
                page.drawText('CESSIONARIO', { x: 480, y: rightY, size: 7, font: font });

                y = topBoxY - 72;

                // RIQUADRO MITTENTE - PIĂ™ GENEROSO
                page.drawRectangle({
                    x: 40, y: y - 65, width: 515, height: 70,
                    borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 1
                });
                page.drawText('MITTENTE (LUOGO DI RITIRO):', { x: 45, y: y, size: 8, font: fontBold });
                y -= 17;
                page.drawText('GE ULTRASOUND C/O MITSAFETRANS', { x: 45, y: y, size: 9, font: font });
                y -= 13;
                page.drawText('VIA ARTIGIANATO, 12', { x: 45, y: y, size: 9, font: font });
                y -= 13;
                page.drawText('20061 CARUGATE (MI)', { x: 45, y: y, size: 9, font: font });

                y -= 35;

                // RIQUADRO DESTINATARIO - MOLTO PIĂ™ GENEROSO
                const destLines = destinatario.split('\n');
                const destBoxHeight = Math.max(75, 20 + (destLines.length * 14) + 15);
                
                page.drawRectangle({
                    x: 40, y: y - destBoxHeight + 10, width: 515, height: destBoxHeight,
                    borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 1
                });
                
                page.drawText('DESTINATARIO (LUOGO DI DESTINAZIONE):', { x: 45, y: y, size: 8, font: fontBold });
                y -= 18;
                
                destLines.forEach(line => {
                    page.drawText(line, { x: 45, y: y, size: 9, font });
                    y -= 14;
                });

                y -= 25;

                // CAUSALE
                page.drawText('CAUSALE DEL TRASPORTO:', { x: 40, y: y, size: 8, font: fontBold });
                page.drawText(causale, { x: 180, y: y, size: 9, font: font });

                y -= 35;

                // TABELLA ARTICOLI CON CELLE (SENZA RIGHE ORIZZONTALI TRA ITEMS)
                const col1 = 40;
                const col2 = 90;
                const col3 = 320;
                const col4 = 390;
                const col5 = 440;
                const col6 = 490;

                // Header tabella con linee verticali
                const headerY = y;
                page.drawLine({ start: { x: 40, y: headerY + 5 }, end: { x: 555, y: headerY + 5 }, thickness: 1 });

                // Linee verticali header
                page.drawLine({ start: { x: col2, y: headerY + 5 }, end: { x: col2, y: headerY - 25 }, thickness: 1 });
                page.drawLine({ start: { x: col3, y: headerY + 5 }, end: { x: col3, y: headerY - 25 }, thickness: 1 });
                page.drawLine({ start: { x: col4, y: headerY + 5 }, end: { x: col4, y: headerY - 25 }, thickness: 1 });
                page.drawLine({ start: { x: col5, y: headerY + 5 }, end: { x: col5, y: headerY - 25 }, thickness: 1 });
                page.drawLine({ start: { x: col6, y: headerY + 5 }, end: { x: col6, y: headerY - 25 }, thickness: 1 });

                page.drawText('QUANTITA\'', { x: col1 + 5, y: y - 8, size: 7, font: fontBold });
                page.drawText('DESCRIZIONE DEI BENI', { x: col2 + 5, y: y - 8, size: 7, font: fontBold });
                page.drawText('Codice', { x: col3 + 5, y: y - 8, size: 7, font: fontBold });
                page.drawText('PESO', { x: col4 + 5, y: y - 8, size: 7, font: fontBold });
                page.drawText('PESO', { x: col5 + 5, y: y - 8, size: 7, font: fontBold });
                page.drawText('TOTALE', { x: col6 + 5, y: y - 8, size: 7, font: fontBold });
                y -= 12;
                page.drawText('articolo', { x: col3 + 5, y: y - 8, size: 7, font: fontBold });
                page.drawText('RILEVATO A', { x: col5 + 5, y: y - 8, size: 7, font: fontBold });
                page.drawText('COLLI', { x: col6 + 5, y: y - 8, size: 7, font: fontBold });
                y -= 8;
                page.drawText('MAGAZZINO', { x: col5 + 5, y: y - 8, size: 7, font: fontBold });

                y -= 5;
                page.drawLine({ start: { x: 40, y: y }, end: { x: 555, y: y }, thickness: 1 });

                y -= 18;
                const firstItemY = y;

                // RIGHE ARTICOLI CON CELLE (SENZA SEPARATORI ORIZZONTALI)
                let totalQty = 0;
                itemsToInclude.forEach((item, index) => {
                    if (y < 150) {
                        // Nuova pagina SENZA chiudere la tabella
                        page = pdfDoc.addPage([595.28, 841.89]);
                        y = height - 50;
                    }

                    totalQty += item.quantity;
                    const rowStartY = y + 5;

                    // Determina altezza riga (piĂą alta se c'Ă¨ seriale)
                    const hasSerial = item.serial && item.serial !== 'N/A';
                    const rowHeight = hasSerial ? 28 : 18;

                    // Linee verticali per questa riga
                    page.drawLine({ start: { x: col2, y: rowStartY }, end: { x: col2, y: rowStartY - rowHeight }, thickness: 0.5 });
                    page.drawLine({ start: { x: col3, y: rowStartY }, end: { x: col3, y: rowStartY - rowHeight }, thickness: 0.5 });
                    page.drawLine({ start: { x: col4, y: rowStartY }, end: { x: col4, y: rowStartY - rowHeight }, thickness: 0.5 });
                    page.drawLine({ start: { x: col5, y: rowStartY }, end: { x: col5, y: rowStartY - rowHeight }, thickness: 0.5 });
                    page.drawLine({ start: { x: col6, y: rowStartY }, end: { x: col6, y: rowStartY - rowHeight }, thickness: 0.5 });

                    // Contenuto celle
                    const textY = hasSerial ? y - 2 : y - 7;
                    
                    page.drawText(item.quantity.toString(), { x: col1 + 18, y: textY, size: 8, font });

                    let desc = item.description.length > 30 ? item.description.substring(0, 27) + '...' : item.description;
                    page.drawText(desc, { x: col2 + 5, y: textY, size: 8, font });
                    
                    page.drawText(item.itemNumber, { x: col3 + 5, y: textY, size: 8, font });

                    // Seriale sotto (solo se non Ă¨ N/A)
                    if (hasSerial) {
                        y -= 12;
                        page.drawText(`S/N: ${item.serial}`, { 
                            x: col2 + 5, y: y, size: 7, font,
                            color: PDFLib.rgb(0.4, 0.4, 0.4)
                        });
                        y -= 16;
                    } else {
                        y -= 18;
                    }
                });

                // Chiudi tabella
                y -= 5;
                page.drawLine({ start: { x: 40, y: y }, end: { x: 555, y: y }, thickness: 1 });
                
                // Linee verticali esterne (bordi laterali tabella)
                page.drawLine({ start: { x: 40, y: firstItemY + 43 }, end: { x: 40, y: y }, thickness: 1 });
                page.drawLine({ start: { x: 555, y: firstItemY + 43 }, end: { x: 555, y: y }, thickness: 1 });

                // TOTALI
                y -= 20;
                page.drawText('TOTALE ARTICOLI: ' + itemsToInclude.length, {
                    x: col1, y: y, size: 9, font: fontBold
                });
                page.drawText('TOTALE QUANTITA\': ' + totalQty, {
                    x: 250, y: y, size: 9, font: fontBold
                });

                // NOTE
                y -= 40;
                if (y < 200) {
                    page = pdfDoc.addPage([595.28, 841.89]);
                    y = height - 50;
                }
                page.drawText('NOTE:', { x: 40, y: y, size: 8, font: fontBold });
                y -= 90;

                // TABELLA FIRMA CON CELLE
                const firmaHeight = 100;
                const firmaY = y;
                
                // Bordo esterno
                page.drawRectangle({
                    x: 40, y: firmaY - firmaHeight, width: 515, height: firmaHeight,
                    borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 1
                });

                // Linee verticali interne
                page.drawLine({ start: { x: 290, y: firmaY }, end: { x: 290, y: firmaY - firmaHeight }, thickness: 1 });
                page.drawLine({ start: { x: 360, y: firmaY }, end: { x: 360, y: firmaY - firmaHeight }, thickness: 1 });
                page.drawLine({ start: { x: 430, y: firmaY }, end: { x: 430, y: firmaY - firmaHeight }, thickness: 1 });

                // Linea orizzontale separazione header
                page.drawLine({ start: { x: 40, y: firmaY - 15 }, end: { x: 555, y: firmaY - 15 }, thickness: 1 });

                // Linea orizzontale separazione NOTE/FIRMA
                const noteLineY = firmaY - firmaHeight/2;
                page.drawLine({ start: { x: 40, y: noteLineY }, end: { x: 555, y: noteLineY }, thickness: 1 });

                // HEADER
                page.drawText('GENERALITA\' DEL TRASPORTATORE', { x: 45, y: firmaY - 10, size: 7, font: fontBold });
                page.drawText('DATA', { x: 295, y: firmaY - 10, size: 7, font: fontBold });
                page.drawText('ORA', { x: 365, y: firmaY - 10, size: 7, font: fontBold });
                page.drawText('FIRME', { x: 435, y: firmaY - 10, size: 7, font: fontBold });

                // PRIMA RIGA - RITIRO
                page.drawText('RITIRO', { x: 435, y: firmaY - 28, size: 7, font: font });

                // Linea separazione RITIRO/CONDUCENTE
                page.drawLine({ start: { x: 430, y: firmaY - 35 }, end: { x: 555, y: firmaY - 35 }, thickness: 0.5 });

                // SECONDA RIGA - CONDUCENTE
                page.drawText('CONDUCENTE', { x: 435, y: firmaY - 46, size: 7, font: font });

                // NOTE section (parte sinistra inferiore)
                page.drawText('NOTE:', { x: 45, y: noteLineY - 10, size: 7, font: fontBold });

                // CONSEGNA section (parte destra inferiore)
                page.drawText('CONSEGNA', { x: 435, y: noteLineY - 15, size: 7, font: font });
                
                // Linea separazione CONSEGNA/DESTINATARIO
                page.drawLine({ start: { x: 430, y: noteLineY - 25 }, end: { x: 555, y: noteLineY - 25 }, thickness: 0.5 });
                
                page.drawText('DESTINATARIO', { x: 435, y: noteLineY - 38, size: 7, font: font });

                // SALVA
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                const boxLabel = selectedBoxes ? selectedBoxes.join('-') : 'ALL';
                const dateStr = formatDate(delDate).replace(/\//g, '-');
                a.download = `DDT_GE_${dateStr}_Box_${boxLabel}.pdf`;
                a.click();

                showLoading(false);
                alert('Documento di trasporto generato con successo!');

            } catch (error) {
                showError('Errore: ' + error.message);
                showLoading(false);
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('it-IT');
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
            document.getElementById('generateBtn').disabled = show;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
            setTimeout(() => errorDiv.classList.remove('active'), 5000);
        }

        document.getElementById('delDate').valueAsDate = new Date();
    </script>
</body>
</html>
