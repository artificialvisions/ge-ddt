<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GE Healthcare - Generatore DDT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6E4C9F 0%, #8B5FBF 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(110, 76, 159, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #6E4C9F 0%, #8B5FBF 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid #5A3D7F;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            opacity: 0.95;
            font-size: 14px;
            font-weight: 300;
        }

        .content {
            padding: 40px;
        }

        .step {
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .step:nth-child(1) { animation-delay: 0.1s; }
        .step:nth-child(2) { animation-delay: 0.2s; }
        .step:nth-child(3) { animation-delay: 0.3s; }
        .step:nth-child(4) { animation-delay: 0.4s; }
        .step:nth-child(5) { animation-delay: 0.5s; }
        .step:nth-child(6) { animation-delay: 0.6s; }

        .step-number {
            display: inline-block;
            background: linear-gradient(135deg, #6E4C9F 0%, #8B5FBF 100%);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            margin-right: 10px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus {
            outline: none;
            border-color: #6E4C9F;
            box-shadow: 0 0 0 3px rgba(110, 76, 159, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-input-button {
            display: inline-block;
            padding: 12px 20px;
            background: linear-gradient(135deg, #6E4C9F 0%, #8B5FBF 100%);
            color: white;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .file-input-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(110, 76, 159, 0.3);
        }

        .file-name {
            margin-top: 10px;
            padding: 8px;
            background: #f8f4fc;
            border-radius: 4px;
            font-size: 13px;
            color: #6E4C9F;
            display: none;
            border-left: 3px solid #6E4C9F;
        }

        .btn {
            background: linear-gradient(135deg, #6E4C9F 0%, #8B5FBF 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(110, 76, 159, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #6E4C9F;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6E4C9F;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .preview {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 4px;
            display: none;
            border: 2px solid #6E4C9F;
        }

        .preview.active {
            display: block;
        }

        .preview h3 {
            color: #6E4C9F;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .items-table th {
            background: linear-gradient(135deg, #6E4C9F 0%, #8B5FBF 100%);
            color: white;
            padding: 10px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
        }

        .items-table td {
            padding: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .items-table tr:hover {
            background: #f8f4fc;
        }

        .items-table input {
            width: 100%;
            padding: 6px;
            border: 1px solid #e0e0e0;
            border-radius: 3px;
            font-size: 13px;
        }

        .items-table input:focus {
            outline: none;
            border-color: #6E4C9F;
        }

        .items-table .qty-input {
            width: 50px;
            text-align: center;
        }

        .items-table .code-input {
            width: 100px;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .add-item-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        .add-item-btn:hover {
            background: #218838;
        }

        .items-summary {
            margin-top: 15px;
            padding: 10px;
            background: #f8f4fc;
            border-radius: 4px;
            font-weight: 600;
            color: #6E4C9F;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        .error.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>GE HEALTHCARE</h1>
            <p>Generatore Documento di Trasporto (D.D.T.)</p>
        </div>

        <div class="content">
            <div class="step">
                <label>
                    <span class="step-number">1</span>
                    Carica Packing Slip (PDF)
                </label>
                <div class="file-input-wrapper">
                    <div class="file-input-button">Seleziona File PDF</div>
                    <input type="file" id="packingSlip" accept=".pdf,.PDF,application/pdf" />
                </div>
                <div class="file-name" id="fileName"></div>
            </div>

            <div class="step">
                <label for="boxNumber">
                    <span class="step-number">2</span>
                    Numero BOX (Cnt#)
                </label>
                <input type="text" id="boxNumber" placeholder="es. 1,2,3 o 1-5 (vuoto = tutti)">
                <div class="hint">Gli articoli saranno ordinati per box number</div>
                <button class="btn" style="margin-top: 10px; padding: 10px 20px; font-size: 14px;" onclick="loadItemsTable()" id="loadItemsBtn" disabled>
                    Carica Articoli
                </button>
            </div>

            <div class="step">
                <label for="committente">
                    <span class="step-number">3</span>
                    Committente (Cedente)
                </label>
                <textarea id="committente" rows="3" required>GE ULTRASOUND
VIA GALENO, 36
20126 MILANO (MI)</textarea>
            </div>

            <div class="step">
                <label for="mittente">
                    <span class="step-number">4</span>
                    Mittente (Luogo di Ritiro)
                </label>
                <textarea id="mittente" rows="3" required>GE ULTRASOUND C/O MITSAFETRANS
VIA ARTIGIANATO, 12
20061 CARUGATE (MI)</textarea>
            </div>

            <div class="step">
                <label for="causale">
                    <span class="step-number">5</span>
                    Causale del Trasporto
                </label>
                <input type="text" id="causale" placeholder="es. TRASFERIMENTO, DIMOSTRAZIONE, SOSTITUZIONE..." required>
                <div class="hint">Inserisci la causale del trasporto</div>
            </div>

            <div class="step">
                <label for="docNumber">
                    <span class="step-number">6</span>
                    Numero Documento (opzionale)
                </label>
                <input type="text" id="docNumber" placeholder="es. DDT/2025/001">
            </div>

            <div class="step">
                <label for="delDate">
                    <span class="step-number">7</span>
                    Data DEL
                </label>
                <input type="date" id="delDate" required>
            </div>

            <div class="step">
                <label for="destinatario">
                    <span class="step-number">8</span>
                    Destinatario (Luogo di Destinazione)
                </label>
                <textarea id="destinatario" placeholder="Inserisci l'indirizzo completo" required></textarea>
            </div>

            <div class="error" id="error"></div>
            
            <div class="preview" id="preview">
                <h3>Articoli Estratti - Modifica prima di generare</h3>
                <table class="items-table" id="itemsTable">
                    <thead>
                        <tr>
                            <th>Box</th>
                            <th>Codice</th>
                            <th>Descrizione</th>
                            <th>QTY</th>
                            <th>Serial Number</th>
                            <th>Azione</th>
                        </tr>
                    </thead>
                    <tbody id="itemsTableBody">
                    </tbody>
                </table>
                <button class="add-item-btn" onclick="addNewItem()">+ Aggiungi Articolo</button>
                <div class="items-summary" id="itemsSummary"></div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Elaborazione in corso...</p>
            </div>

            <button class="btn" id="generateBtn" onclick="generateDDT()">
                Genera D.D.T. PDF
            </button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let packingSlipData = null;
        let extractedItems = []; // Array globale per items editabili

        document.getElementById('packingSlip').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileName').style.display = 'block';
                loadPDF(file);
            }
        });

        async function loadPDF(file) {
            showLoading(true);
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                
                let fullText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    
                    const sortedItems = textContent.items.sort((a, b) => {
                        const yDiff = Math.abs(a.transform[5] - b.transform[5]);
                        if (yDiff < 5) {
                            return a.transform[4] - b.transform[4];
                        }
                        return b.transform[5] - a.transform[5];
                    });
                    
                    let lastY = null;
                    sortedItems.forEach(item => {
                        const currentY = Math.round(item.transform[5]);
                        if (lastY !== null && Math.abs(currentY - lastY) > 5) {
                            fullText += '\n';
                        }
                        fullText += item.str + ' ';
                        lastY = currentY;
                    });
                    fullText += '\n\n';
                }
                
                packingSlipData = parsePackingSlip(fullText);
                
                if (packingSlipData.items.length === 0) {
                    showError('Nessun articolo trovato nel PDF!');
                } else {
                    showPreview(packingSlipData);
                }
                
                showLoading(false);
            } catch (error) {
                showError('Errore caricamento PDF: ' + error.message);
                showLoading(false);
            }
        }

        function parsePackingSlip(text) {
            console.log('=== PARSING PACKING SLIP ===');
            console.log('Testo completo (primi 2000 caratteri):', text.substring(0, 2000));
            
            const data = {
                deliveryName: '',
                waybill: '',
                items: [],
                serialMap: {}
            };

            // ESTRAZIONE DELIVERY NAME E WAYBILL - pattern più robusti
            let deliveryMatch = text.match(/Delivery\s+Name[:\s]+(\d{10,})/i);
            if (!deliveryMatch) {
                deliveryMatch = text.match(/Org:\s+\w+\s+Delivery\s+Name:\s+(\d{10,})/i);
            }
            if (deliveryMatch) {
                data.deliveryName = deliveryMatch[1];
                console.log('✓ Delivery Name trovato:', data.deliveryName);
            }

            const waybillMatch = text.match(/Waybill[:\s]+([A-Z0-9]{10,})/i);
            if (waybillMatch) {
                data.waybill = waybillMatch[1];
                console.log('✓ Waybill trovato:', data.waybill);
            }

            // PARSING SERIALI dalla sezione "Lot/Serial Information"
            console.log('--- Ricerca Seriali ---');
            const serialSection = text.match(/Lot\/Serial\s+Information([\s\S]*?)(?:Additional Information|$)/i);
            if (serialSection) {
                console.log('✓ Sezione Lot/Serial trovata');
                const serialText = serialSection[1];
                console.log('Testo sezione seriali (primi 800 caratteri):', serialText.substring(0, 800));
                const serialLines = serialText.split('\n');

                // Approccio multi-riga: traccia l'ultimo codice articolo visto
                let currentItemCode = null;
                for (const line of serialLines) {
                    const trimmed = line.trim();

                    // Cerca il codice articolo (es. H48232DF)
                    const codeMatch = trimmed.match(/^(H\d{5}[A-Z]{1,3})\b/);
                    if (codeMatch) {
                        currentItemCode = codeMatch[1];
                        console.log(`  Codice trovato: ${currentItemCode}`);
                        // Controlla se c'è anche un seriale sulla stessa riga
                        const inlineSerial = trimmed.match(/H\d{5}[A-Z]{1,3}\s+\([^)]+\)\s+\d+\s+\d+\s+([A-Z0-9]{5,})/);
                        if (inlineSerial) {
                            if (!data.serialMap[currentItemCode]) data.serialMap[currentItemCode] = [];
                            data.serialMap[currentItemCode].push(inlineSerial[1]);
                            console.log(`    → seriale inline: ${inlineSerial[1]}`);
                            currentItemCode = null;
                        }
                        continue;
                    }

                    // Se abbiamo un codice articolo corrente, cerca il seriale
                    // La riga con il seriale è tipicamente: "<qty> <cnt#>  <SERIAL>"
                    if (currentItemCode) {
                        const serialMatch = trimmed.match(/^\d+\s+\d+\s+([A-Z0-9]{5,})/);
                        if (serialMatch) {
                            if (!data.serialMap[currentItemCode]) data.serialMap[currentItemCode] = [];
                            data.serialMap[currentItemCode].push(serialMatch[1]);
                            console.log(`    → ${currentItemCode}: ${serialMatch[1]}`);
                            currentItemCode = null;
                        }
                    }
                }
            } else {
                console.error('✗ Sezione Lot/Serial Information NON trovata!');
            }
            console.log('Mappa seriali completa:', data.serialMap);

            // PARSING CONTAINER SUMMARY
            console.log('--- Ricerca Container Summary ---');
            const containerSection = text.match(/Container\s+Summary([\s\S]*?)(?:Container Information|Additional Information|$)/i);
            if (!containerSection) {
                console.error('✗ Container Summary NON trovata!');
                return data;
            }
            
            console.log('✓ Container Summary trovata');
            const containerText = containerSection[1];
            const lines = containerText.split('\n');
            
            console.log(`Linee da processare: ${lines.length}`);
            
            for (const line of lines) {
                // Pattern: UAS1260566 1 H40402LY - (12L-RS Probe) 1 1
                const itemMatch = line.match(/UAS\d+\s+(\d+)\s+(H\d{5}[A-Z]{1,2})\s+-\s+\(([^)]+)\)\s+(\d+)\s+\d+/);
                
                if (itemMatch) {
                    const boxNumber = parseInt(itemMatch[1]);
                    const itemNumber = itemMatch[2];
                    let description = itemMatch[3].trim();
                    const quantity = parseInt(itemMatch[4]);
                    
                    // Cerca seriali disponibili per questo item
                    const availableSerials = data.serialMap[itemNumber] || [];
                    
                    console.log(`  Item trovato: Box ${boxNumber} | ${itemNumber} | Qty ${quantity} | Seriali disponibili: ${availableSerials.length}`);
                    
                    // Se qty > 1 e abbiamo seriali, crea items separati
                    if (quantity > 1 && availableSerials.length >= quantity) {
                        for (let q = 0; q < quantity; q++) {
                            const serial = availableSerials.shift() || 'N/A';
                            data.items.push({
                                boxNumber,
                                itemNumber,
                                description,
                                quantity: 1,
                                serial
                            });
                        }
                    } else {
                        // Item singolo o senza seriale
                        const serial = availableSerials.length > 0 ? availableSerials.shift() : 'N/A';
                        data.items.push({
                            boxNumber,
                            itemNumber,
                            description,
                            quantity,
                            serial
                        });
                    }
                }
            }

            console.log(`✓ Totale articoli estratti: ${data.items.length}`);
            console.log('=== FINE PARSING ===');
            return data;
        }

        function showPreview(data) {
            // Salva i dati ma NON mostrare ancora la tabella
            packingSlipData = data;
            
            // Abilita il bottone "Carica Articoli"
            document.getElementById('loadItemsBtn').disabled = false;
            
            showLoading(false);
        }

        function loadItemsTable() {
            if (!packingSlipData || !packingSlipData.items) {
                showError('Nessun dato caricato!');
                return;
            }

            const boxNumberInput = document.getElementById('boxNumber').value;
            const selectedBoxes = parseBoxNumbers(boxNumberInput);
            
            let itemsToShow = packingSlipData.items;
            
            // Filtra per box se specificato
            if (selectedBoxes) {
                itemsToShow = packingSlipData.items.filter(item => 
                    selectedBoxes.includes(item.boxNumber)
                );
                
                if (itemsToShow.length === 0) {
                    showError('Nessun articolo trovato per i box specificati!');
                    return;
                }
            }

            // Popola la tabella editabile
            extractedItems = itemsToShow.map((item, index) => ({
                id: index,
                boxNumber: item.boxNumber,
                itemNumber: item.itemNumber,
                description: item.description,
                quantity: item.quantity,
                serial: item.serial
            }));
            
            renderItemsTable();
            
            // Mostra la preview
            document.getElementById('preview').classList.add('active');
        }

        function renderItemsTable() {
            const tbody = document.getElementById('itemsTableBody');
            tbody.innerHTML = '';
            
            extractedItems.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="number" class="qty-input" value="${item.boxNumber}" onchange="updateItem(${index}, 'boxNumber', this.value)"></td>
                    <td><input type="text" class="code-input" value="${item.itemNumber}" onchange="updateItem(${index}, 'itemNumber', this.value)"></td>
                    <td><input type="text" value="${item.description}" onchange="updateItem(${index}, 'description', this.value)"></td>
                    <td><input type="number" class="qty-input" value="${item.quantity}" onchange="updateItem(${index}, 'quantity', this.value)"></td>
                    <td><input type="text" value="${item.serial}" onchange="updateItem(${index}, 'serial', this.value)"></td>
                    <td><button class="delete-btn" onclick="deleteItem(${index})">Elimina</button></td>
                `;
                tbody.appendChild(row);
            });
            
            updateSummary();
        }

        function updateItem(index, field, value) {
            extractedItems[index][field] = value;
            updateSummary();
        }

        function deleteItem(index) {
            extractedItems.splice(index, 1);
            renderItemsTable();
        }

        function addNewItem() {
            const newItem = {
                id: extractedItems.length,
                boxNumber: 1,
                itemNumber: '',
                description: '',
                quantity: 1,
                serial: 'N/A'
            };
            extractedItems.push(newItem);
            renderItemsTable();
        }

        function updateSummary() {
            const summary = document.getElementById('itemsSummary');
            const totalItems = extractedItems.length;
            const totalQty = extractedItems.reduce((sum, item) => sum + parseInt(item.quantity || 0), 0);
            const boxes = [...new Set(extractedItems.map(item => item.boxNumber))].sort((a,b) => a-b).join(', ');
            
            summary.innerHTML = `
                <strong>Totale Articoli:</strong> ${totalItems} | 
                <strong>Totale Quantità:</strong> ${totalQty} | 
                <strong>Box:</strong> ${boxes}
            `;
        }

        function parseBoxNumbers(input) {
            if (!input || input.trim() === '') {
                return null;
            }

            const boxNumbers = new Set();
            const parts = input.split(',').map(s => s.trim());

            parts.forEach(part => {
                if (part.includes('-')) {
                    const [start, end] = part.split('-').map(n => parseInt(n.trim()));
                    if (!isNaN(start) && !isNaN(end)) {
                        for (let i = start; i <= end; i++) {
                            boxNumbers.add(i);
                        }
                    }
                } else {
                    const num = parseInt(part);
                    if (!isNaN(num)) {
                        boxNumbers.add(num);
                    }
                }
            });

            return boxNumbers.size > 0 ? Array.from(boxNumbers).sort((a, b) => a - b) : null;
        }

        async function generateDDT() {
            if (!extractedItems || extractedItems.length === 0) {
                showError('Carica prima una Packing Slip valida!');
                return;
            }

            const boxNumberInput = document.getElementById('boxNumber').value;
            const docNumber = document.getElementById('docNumber').value;
            const delDate = document.getElementById('delDate').value;
            const destinatario = document.getElementById('destinatario').value;
            const causale = document.getElementById('causale').value;
            const committente = document.getElementById('committente').value;
            const mittente = document.getElementById('mittente').value;

            if (!delDate || !destinatario || !causale || !committente || !mittente) {
                showError('Compila tutti i campi obbligatori!');
                return;
            }

            showLoading(true);

            try {
                // USA GLI ITEMS DALLA TABELLA EDITABILE
                let itemsToInclude = extractedItems;
                const selectedBoxes = parseBoxNumbers(boxNumberInput);
                
                if (selectedBoxes) {
                    itemsToInclude = extractedItems.filter(item => 
                        selectedBoxes.includes(parseInt(item.boxNumber))
                    );
                    
                    if (itemsToInclude.length === 0) {
                        showError('Nessun articolo per i box specificati!');
                        showLoading(false);
                        return;
                    }
                }

                // ORDINA PER BOX NUMBER
                itemsToInclude.sort((a, b) => parseInt(a.boxNumber) - parseInt(b.boxNumber));

                const pdfDoc = await PDFLib.PDFDocument.create();
                let page = pdfDoc.addPage([595.28, 841.89]);
                const { width, height } = page.getSize();
                
                const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
                const fontBold = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);

                let y = height - 40;

                // HEADER
                page.drawText('DOCUMENTO N°: MOD.ESENZIONE rev.0', {
                    x: 40, y: y, size: 8, font: font
                });
                page.drawText('DOCUMENTO DI TRASPORTO (D.D.T.)', {
                    x: 340, y: y, size: 10, font: fontBold
                });
                y -= 12;
                page.drawText('(D.P.R. 472 del 14-08-1996 – D.P.R. 696 del 21-12-1996)', {
                    x: 310, y: y, size: 7, font: font
                });

                y -= 30;

                // RIQUADRI SUPERIORI - PERFETTAMENTE ALLINEATI
                const topBoxY = y;
                
                // RIQUADRO COMMITTENTE - PIÙ SPAZIO DAL BORDO SUPERIORE
                const committenteLines = committente.split('\n');
                const committenteHeight = Math.max(67, 20 + (committenteLines.length * 13));
                
                page.drawRectangle({
                    x: 40, y: topBoxY - committenteHeight + 5, width: 250, height: committenteHeight,
                    borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 1
                });
                page.drawText('COMMITTENTE (CEDENTE):', { x: 45, y: topBoxY - 7, size: 8, font: fontBold });
                let commitY = topBoxY - 22;
                committenteLines.forEach(line => {
                    page.drawText(line, { x: 45, y: commitY, size: 9, font });
                    commitY -= 13;
                });

                // RIQUADRO NUMERO E DATA - PIÙ SPAZIO DAL BORDO SUPERIORE
                page.drawRectangle({
                    x: 300, y: topBoxY - committenteHeight + 5, width: 255, height: committenteHeight,
                    borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 1
                });
                
                let rightY = topBoxY - 7;
                page.drawText('NUMERO:', { x: 305, y: rightY, size: 8, font: fontBold });
                if (docNumber) {
                    page.drawText(docNumber, { x: 355, y: rightY, size: 9, font: font });
                }
                page.drawText('DEL:', { x: 450, y: rightY, size: 8, font: fontBold });
                page.drawText(formatDate(delDate), { x: 480, y: rightY, size: 9, font: font });
                
                rightY -= 17;
                page.drawText('RIFERIMENTO MITTENTE:', { x: 305, y: rightY, size: 8, font: fontBold });
                
                rightY -= 17;
                page.drawText('A MEZZO:', { x: 305, y: rightY, size: 7, font: font });
                
                // Disegna checkbox grafici
                const checkboxY = rightY - 2;
                page.drawRectangle({ x: 348, y: checkboxY, width: 8, height: 8, borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 0.5 });
                page.drawText('VETTORE', { x: 360, y: rightY, size: 7, font: font });
                
                page.drawRectangle({ x: 408, y: checkboxY, width: 8, height: 8, borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 0.5 });
                page.drawText('CEDENTE', { x: 420, y: rightY, size: 7, font: font });
                
                page.drawRectangle({ x: 468, y: checkboxY, width: 8, height: 8, borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 0.5 });
                page.drawText('CESSIONARIO', { x: 480, y: rightY, size: 7, font: font });

                y = topBoxY - committenteHeight - 10;

                // RIQUADRO MITTENTE - PIÙ SPAZIO SOPRA
                const mittenteLines = mittente.split('\n');
                const mittenteHeight = Math.max(70, 20 + (mittenteLines.length * 13) + 10);
                
                page.drawRectangle({
                    x: 40, y: y - mittenteHeight + 5, width: 515, height: mittenteHeight,
                    borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 1
                });
                page.drawText('MITTENTE (LUOGO DI RITIRO):', { x: 45, y: y - 5, size: 8, font: fontBold });
                let mittY = y - 22;
                mittenteLines.forEach(line => {
                    page.drawText(line, { x: 45, y: mittY, size: 9, font });
                    mittY -= 13;
                });

                y = y - mittenteHeight - 10;

                // RIQUADRO DESTINATARIO - MOLTO PIÙ GENEROSO
                const destLines = destinatario.split('\n');
                const destBoxHeight = Math.max(75, 20 + (destLines.length * 14) + 15);
                
                page.drawRectangle({
                    x: 40, y: y - destBoxHeight + 10, width: 515, height: destBoxHeight,
                    borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 1
                });
                
                page.drawText('DESTINATARIO (LUOGO DI DESTINAZIONE):', { x: 45, y: y, size: 8, font: fontBold });
                y -= 18;
                
                destLines.forEach(line => {
                    page.drawText(line, { x: 45, y: y, size: 9, font });
                    y -= 14;
                });

                y -= 25;

                // CAUSALE - ALLINEATA COME GLI ALTRI RIQUADRI
                page.drawText('CAUSALE DEL TRASPORTO:', { x: 45, y: y, size: 8, font: fontBold });
                page.drawText(causale, { x: 200, y: y, size: 9, font: font });

                y -= 35;

                // TABELLA ARTICOLI - Colonne ottimizzate
                const col1 = 40;   // Codice articolo (110px)
                const col2 = 150;  // Descrizione (300px)
                const col3 = 450;  // Quantità (30px)
                const col4 = 480;  // Serial Number (75px)

                // Linea superiore tabella
                page.drawLine({ start: { x: 40, y: y }, end: { x: 555, y: y }, thickness: 1 });
                y -= 12;

                // Header
                page.drawText('Codice articolo', { x: col1 + 5, y: y, size: 7, font: fontBold });
                page.drawText('DESCRIZIONE DEI BENI', { x: col2 + 5, y: y, size: 7, font: fontBold });
                page.drawText('QTY', { x: col3 + 5, y: y, size: 7, font: fontBold });
                page.drawText('SERIAL NUMBER', { x: col4 + 5, y: y, size: 7, font: fontBold });

                y -= 8;
                page.drawLine({ start: { x: 40, y: y }, end: { x: 555, y: y }, thickness: 1 });

                y -= 15;
                const tableStartY = y;

                // RIGHE ARTICOLI
                let totalQty = 0;
                itemsToInclude.forEach((item, index) => {
                    if (y < 150) {
                        page = pdfDoc.addPage([595.28, 841.89]);
                        y = height - 50;
                    }

                    totalQty += parseInt(item.quantity) || 0;

                    // Codice articolo
                    page.drawText(item.itemNumber, { x: col1 + 5, y: y, size: 8, font });

                    // Descrizione (colonna più stretta)
                    let desc = item.description.length > 38 ? item.description.substring(0, 35) + '...' : item.description;
                    page.drawText(desc, { x: col2 + 5, y: y, size: 8, font });
                    
                    // Quantità (centrata in 30px)
                    page.drawText(String(parseInt(item.quantity) || 0), { x: col3 + 8, y: y, size: 8, font });

                    // Serial Number (colonna più larga: 75px)
                    const serialText = (item.serial && item.serial !== 'N/A') ? item.serial : '';
                    if (serialText) {
                        page.drawText(serialText, { x: col4 + 5, y: y, size: 8, font });
                    }

                    y -= 22;
                });

                // NOTE
                y -= 40;
                if (y < 200) {
                    page = pdfDoc.addPage([595.28, 841.89]);
                    y = height - 50;
                }
                page.drawText('NOTE:', { x: 40, y: y, size: 8, font: fontBold });
                y -= 90;

                // TABELLA FIRMA CON CELLE
                const firmaHeight = 100;
                const firmaY = y;
                
                // Bordo esterno
                page.drawRectangle({
                    x: 40, y: firmaY - firmaHeight, width: 515, height: firmaHeight,
                    borderColor: PDFLib.rgb(0, 0, 0), borderWidth: 1
                });

                // Linee verticali interne
                page.drawLine({ start: { x: 290, y: firmaY }, end: { x: 290, y: firmaY - firmaHeight }, thickness: 1 });
                page.drawLine({ start: { x: 360, y: firmaY }, end: { x: 360, y: firmaY - firmaHeight }, thickness: 1 });
                page.drawLine({ start: { x: 430, y: firmaY }, end: { x: 430, y: firmaY - firmaHeight }, thickness: 1 });

                // Linea orizzontale separazione header
                page.drawLine({ start: { x: 40, y: firmaY - 15 }, end: { x: 555, y: firmaY - 15 }, thickness: 1 });

                // Linea orizzontale separazione NOTE/FIRMA
                const noteLineY = firmaY - firmaHeight/2;
                page.drawLine({ start: { x: 40, y: noteLineY }, end: { x: 555, y: noteLineY }, thickness: 1 });

                // HEADER
                page.drawText('GENERALITA\' DEL TRASPORTATORE', { x: 45, y: firmaY - 10, size: 7, font: fontBold });
                page.drawText('DATA', { x: 295, y: firmaY - 10, size: 7, font: fontBold });
                page.drawText('ORA', { x: 365, y: firmaY - 10, size: 7, font: fontBold });
                page.drawText('FIRME', { x: 435, y: firmaY - 10, size: 7, font: fontBold });

                // PRIMA RIGA - RITIRO
                page.drawText('RITIRO', { x: 435, y: firmaY - 28, size: 7, font: font });

                // Linea separazione RITIRO/CONDUCENTE
                page.drawLine({ start: { x: 430, y: firmaY - 35 }, end: { x: 555, y: firmaY - 35 }, thickness: 0.5 });

                // SECONDA RIGA - CONDUCENTE
                page.drawText('CONDUCENTE', { x: 435, y: firmaY - 46, size: 7, font: font });

                // NOTE section (parte sinistra inferiore)
                page.drawText('NOTE:', { x: 45, y: noteLineY - 10, size: 7, font: fontBold });

                // CONSEGNA section (parte destra inferiore)
                page.drawText('CONSEGNA', { x: 435, y: noteLineY - 15, size: 7, font: font });
                
                // Linea separazione CONSEGNA/DESTINATARIO
                page.drawLine({ start: { x: 430, y: noteLineY - 25 }, end: { x: 555, y: noteLineY - 25 }, thickness: 0.5 });
                
                page.drawText('DESTINATARIO', { x: 435, y: noteLineY - 38, size: 7, font: font });

                // SALVA
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                const boxLabel = selectedBoxes ? selectedBoxes.join('-') : 'ALL';
                const dateStr = formatDate(delDate).replace(/\//g, '-');
                a.download = `DDT_GE_${dateStr}_Box_${boxLabel}.pdf`;
                a.click();

                showLoading(false);
                alert('Documento di trasporto generato con successo!');

            } catch (error) {
                showError('Errore: ' + error.message);
                showLoading(false);
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('it-IT');
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
            document.getElementById('generateBtn').disabled = show;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
            setTimeout(() => errorDiv.classList.remove('active'), 5000);
        }

        document.getElementById('delDate').valueAsDate = new Date();
    </script>
</body>
</html>
